events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 1. This MUST live inside the http block
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 2. REDIRECT ALL HTTP TRAFFIC (PORT 80) TO HTTPS
    server {
        listen 80;
        server_name denvergram.me www.denvergram.me;
        return 301 https://$host$request_uri; 
    }

    # 3. SECURE APP GATEWAY (PORT 443) - ALL INSIDE THE HTTP WRAPPER
    server {
        listen 443 ssl; # 👈 Turned on SSL!
        server_name denvergram.me www.denvergram.me;

        # Link your newly won Let's Encrypt certificates
        ssl_certificate /etc/letsencrypt/live/denvergram.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/denvergram.me/privkey.pem;

        # Recommended TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index index.html;

        # Frontend files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Standard API proxying
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy Form endpoints
        location /form/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
        }

        # Real-time WebSocket connection upgrades
        location /api/ws {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade; # 👈 Uses your dynamic map block!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}